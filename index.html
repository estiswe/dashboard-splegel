<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boden Core Dashboard</title>

<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: Segoe UI, sans-serif;
    height: 100vh;
    overflow: hidden;
    padding: 12px;
}

.dashboard {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 12px;
    height: 100%;
}

.panel {
    background: #111;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 12px;
    overflow: hidden;
}

.panel-title {
    font-size: 0.85rem;
    color: #888;
    border-bottom: 1px solid #222;
    padding-bottom: 6px;
    margin-bottom: 8px;
}

.radar {
    width: 100%;
    height: 100%;
    border: 0;
}

/* RIGHT SIDE */
.right {
    display: grid;
    grid-template-rows: 1fr 1fr 1fr;
    gap: 12px;
}

/* WEATHER */
.temp {
    font-size: 3rem;
    color: #ffb703;
    font-weight: bold;
}

.small {
    color: #888;
    font-size: 0.85rem;
}

.forecast {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-top: 8px;
}

.day {
    background: #1a1a1a;
    border: 1px solid #222;
    border-radius: 6px;
    text-align: center;
    padding: 6px;
}

/* WATER */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
}

.card {
    background: #1a1a1a;
    border: 1px solid #222;
    border-radius: 6px;
    text-align: center;
    padding: 10px;
}

.value {
    font-size: 1.3rem;
    color: #00d2ff;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="dashboard">

<!-- LEFT: RADAR -->
<div class="panel">
    <div class="panel-title">Radar Boden</div>

    <iframe class="radar"
        src="https://www.rainviewer.com/map.html?loc=65.8251,21.6887,8">
    </iframe>
</div>

<!-- RIGHT SIDE -->
<div class="right">

    <!-- WEATHER -->
    <div class="panel">
        <div class="panel-title">Väder</div>

        <div class="temp" id="temp">--°</div>
        <div class="small" id="desc">Laddar...</div>

        <div class="forecast" id="forecast"></div>
    </div>

    <!-- WATER -->
    <div class="panel">
        <div class="panel-title">Boden Kraftverk</div>

        <div class="grid">
            <div class="card">
                <div class="small">Flöde</div>
                <div class="value" id="flow">--</div>
            </div>

            <div class="card">
                <div class="small">Status</div>
                <div class="value" id="status">--</div>
            </div>

            <div class="card">
                <div class="small">Nivå</div>
                <div class="value" id="level">--</div>
            </div>

            <div class="card">
                <div class="small">Effekt</div>
                <div class="value" id="power">--</div>
            </div>
        </div>

        <div class="small" id="updated" style="margin-top:8px;"></div>
    </div>

</div>
</div>

<script>

const WATER_API = "https://DIN-RENDER-URL.onrender.com/water";

/* ================= WEATHER ================= */
async function weather() {
    try {
        const r = await fetch(
            "https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=65.8251&lon=21.6887",
            { headers: { "User-Agent": "BodenDashboard" } }
        );

        const d = await r.json();
        const t = d.properties.timeseries[0];

        document.getElementById("temp").innerText =
            Math.round(t.data.instant.details.air_temperature) + "°";

        document.getElementById("desc").innerText =
            t.data.next_1_hours?.summary?.symbol_code?.replaceAll("_", " ") || "";

        const f = document.getElementById("forecast");
        f.innerHTML = "";

        for (let i = 0; i < 5; i++) {
            const item = d.properties.timeseries[i * 8];
            if (!item) continue;

            const day = new Date(item.time)
                .toLocaleDateString("sv-SE", { weekday: "short" });

            const temp = Math.round(item.data.instant.details.air_temperature);

            f.innerHTML += `
                <div class="day">
                    <div>${day}</div>
                    <div>${temp}°</div>
                </div>`;
        }

    } catch (e) {
        console.log("Weather error", e);
    }
}

/* ================= WATER API ================= */
async function water() {
    try {
        const r = await fetch(WATER_API);
        const d = await r.json();

        document.getElementById("flow").innerText =
            d.flow + " m³/s";

        document.getElementById("status").innerText =
            d.status;

        document.getElementById("level").innerText =
            d.level ?? "N/A";

        document.getElementById("power").innerText =
            d.power ?? "N/A";

        document.getElementById("updated").innerText =
            "Senast uppdaterad: " +
            new Date(d.updated).toLocaleTimeString("sv-SE");

    } catch (e) {
        console.log("Water API error", e);
    }
}

/* ================= RADAR ================= */
function radarRefresh() {
    const f = document.querySelector(".radar");
    const src = f.src;
    f.src = "";
    setTimeout(() => f.src = src, 300);
}

/* ================= START ================= */
weather();
water();
radarRefresh();

/* INTERVALS */
setInterval(weather, 900000);   // 15 min
setInterval(water, 3600000);    // 1 timme
setInterval(radarRefresh, 300000); // 5 min

</script>

</body>
</html>
