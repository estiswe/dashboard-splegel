<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boden Magic Mirror</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', -apple-system, Roboto, Helvetica, sans-serif;
            height: 100vh;
            overflow: hidden;
            padding: 10px;
        }

        /* Grid-layout: 2/3 vänster (Radar), 1/3 höger (Väder + Kraftverk) */
        .dashboard {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-gap: 12px;
            height: 100%;
        }

        .panel {
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-title {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888888;
            margin-bottom: 8px;
            border-bottom: 1px solid #222222;
            padding-bottom: 4px;
        }

        /* Vänster: Radar */
        .radar-container {
            grid-column: 1;
            height: 100%;
        }
        .radar-frame {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 4px;
            background: #050505;
        }

        /* Höger: Stackad kolumn */
        .right-column {
            grid-column: 2;
            display: grid;
            grid-template-rows: 1fr 1fr;
            grid-gap: 12px;
            height: 100%;
        }

        /* Övre högra: Yr-prognos */
        .forecast-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #111111;
        }
        .forecast-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: invert(0.9) hue-rotate(180deg); 
        }

        /* Nedre högra: Vattenfall Utskärning */
        .embed-container {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            border-radius: 4px;
            background: #ffffff; 
        }

        .vattenfall-frame {
            width: 100%;
            height: 600px;
            border: none;
            position: absolute;
            top: -340px; 
            left: -5px;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        
        <!-- VÄNSTER: Live Väderradar (Inzoomad till zoom 8.5 och med autostart-loop) -->
        <div class="panel radar-container">
            <div class="panel-title">Live Väderradar (Animerad)</div>
            <!-- &m=1 sätter igång loopen automatiskt vid start, &f=1 visar regn + framtidsprognos -->
            <iframe class="radar-frame" src="https://www.rainviewer.com/map.html?loc=65.8251,21.6887,8.5&oFa=0&col=1&sty=1&活=1&scr=1&pt=1&f=1&m=1"></iframe>
        </div>

        <!-- HÖGER: Stackad kolumn -->
        <div class="right-column">
            
            <!-- ÖVRE HÖGRA: 3-dagarsprognos -->
            <div class="panel">
                <div class="panel-title">Väderprognos Boden</div>
                <div class="forecast-container">
                    <img class="forecast-img" id="yr-img" src="https://www.yr.no/sv/innehåll/2-2722080/meteogram.svg" alt="Väderprognos">
                </div>
            </div>

            <!-- UNDRE HÖGRA: Vatteninformation direkt från Vattenfall -->
            <div class="panel">
                <div class="panel-title">Vatteninformation (Boden)</div>
                <div class="embed-container">
                    <iframe class="vattenfall-frame" id="vf-frame" src="https://fiskevatten.vattenfall.com/boden/" scrolling="no"></iframe>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Uppdaterar bild och iframe tyst en gång i timmen
        function refreshDashboard() {
            const yrImg = document.getElementById('yr-img');
            if (yrImg) {
                yrImg.src = "https://www.yr.no/sv/innehåll/2-2722080/meteogram.svg?t=" + new Date().getTime();
            }

            const vfFrame = document.getElementById('vf-frame');
            if (vfFrame) {
                vfFrame.src = vfFrame.src;
            }
            console.log("Dashboard uppdaterad:", new Date().toLocaleTimeString());
        }

        setInterval(refreshDashboard, 3600000);
    </script>

</body>
</html>
