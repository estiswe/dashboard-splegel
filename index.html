<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boden Tactical Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', -apple-system, Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
            padding: 12px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-gap: 12px;
            height: 100%;
        }

        .panel {
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-title {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888888;
            margin-bottom: 12px;
            border-bottom: 1px solid #222222;
            padding-bottom: 6px;
        }

        /* Vänster: Radar */
        .radar-container {
            grid-column: 1;
            height: 100%;
        }
        .radar-frame {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 6px;
            background: #050505;
        }

        /* Höger kolumn */
        .right-column {
            grid-column: 2;
            display: grid;
            grid-template-rows: 1.1fr 0.9fr;
            grid-gap: 12px;
            height: 100%;
        }

        /* 3-Dagars Väderprognos Layout */
        .forecast-grid {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            height: 100%;
        }
        .forecast-row {
            display: grid;
            grid-template-columns: 70px 50px 1fr 60px;
            align-items: center;
            padding: 8px;
            background: #161616;
            border-radius: 6px;
            border: 1px solid #222222;
        }
        .day-name {
            font-weight: bold;
            font-size: 0.95rem;
            color: #ffffff;
        }
        .weather-icon {
            width: 32px;
            height: 32px;
        }
        .weather-info {
            font-size: 0.8rem;
            color: #aaaaaa;
            padding-left: 10px;
            text-transform: capitalize;
        }
        .day-temp {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffb703;
            text-align: right;
        }

        /* Ny, stenhård och säker Vattenfall-inbäddning */
        .vatten-container {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            border-radius: 6px;
            background: #ffffff; /* Ljus bakgrund så tabellen blir extremt lättläst på avstånd */
        }
        .vatten-frame {
            width: 100%;
            height: 500px;
            border: none;
            position: absolute;
            top: -345px; /* Denna klipper bort Vattenfalls logga och meny och sätter exakta m3/s-tabellen i fokus */
            left: 0;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        
        <div class="panel radar-container">
            <div class="panel-title">Live Väderradar (Boden)</div>
            <iframe class="radar-frame" src="https://www.rainviewer.com/map.html?loc=65.8251,21.6887,8.5&oFa=0&col=1&sty=1&活=1&scr=1&pt=1&f=1&m=1"></iframe>
        </div>

        <div class="right-column">
            
            <div class="panel">
                <div class="panel-title">3-Dagarsprognos (Boden)</div>
                <div class="forecast-grid" id="weather-forecast">
                    <div style="text-align:center; color:#888;">Laddar väderdata...</div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">Bodens Kraftverk (Live m³/s)</div>
                <div class="vatten-container">
                    <iframe class="vatten-frame" id="vf-frame" src="https://fiskevatten.vattenfall.com/boden/" scrolling="no"></iframe>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Hämtar väder säkert och stabilt utan externa bibliotek
        async function getBodenWeather() {
            try {
                const response = await fetch('https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=65.8251&lon=21.6887', {
                    headers: { 'User-Agent': 'BodenTacticalMirror/3.0' }
                });
                const data = await response.json();
                const timeseries = data.properties.timeseries;
                
                const htmlContainer = document.getElementById('weather-forecast');
                htmlContainer.innerHTML = ''; 

                const dagarsNamn = ['Sön', 'Mån', 'Tis', 'Ons', 'Tor', 'Fre', 'Lör'];
                let visadeDagar = 0;

                for (let i = 0; i < timeseries.length && visadeDagar < 3; i++) {
                    const slot = timeseries[i];
                    const slotDatum = new Date(slot.time);
                    const timme = slotDatum.getHours();
                    
                    if (timme === 13 && slotDatum.getDate() !== new Date().getDate()) {
                        const dagNamn = dagarsNamn[slotDatum.getDay()];
                        const temp = Math.round(slot.data.instant.details.air_temperature);
                        const vind = Math.round(slot.data.instant.details.wind_speed);
                        const symbol = slot.data.next_1_hours.summary.symbol_code;
                        
                        let beskrivning = symbol.replace('_', ' ').split(' ')[0];

                        const row = document.createElement('div');
                        row.className = 'forecast-row';
                        row.innerHTML = `
                            <div class="day-name">${dagNamn}</div>
                            <img class="weather-icon" src="https://raw.githubusercontent.com/metno/weathericons/main/weather/svg/${symbol}.svg" alt="väder">
                            <div class="weather-info">${beskrivning}<br><span style="font-size:0.75rem; color:#666;">Vind: ${vind} m/s</span></div>
                            <div class="day-temp">${temp}°</div>
                        `;
                        htmlContainer.appendChild(row);
                        visadeDagar++;
                    }
                }
            } catch (error) {
                console.error("Väderfel:", error);
                document.getElementById('weather-forecast').innerHTML = '<div style="color:#e74c3c; text-align:center; font-size:0.85rem;">Uppdaterar väder...</div>';
            }
        }

        // Kör direkt vid start
        getBodenWeather();

        // Uppdaterar iFramen för vattenfall och vädret en gång i timmen
        setInterval(() => {
            getBodenWeather();
            const vfFrame = document.getElementById('vf-frame');
            if (vfFrame) vfFrame.src = vfFrame.src;
        }, 3600000);
    </script>

</body>
</html>
