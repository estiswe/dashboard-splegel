<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boden Core Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', -apple-system, Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
            padding: 12px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-gap: 12px;
            height: 100%;
        }

        .panel {
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-title {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888888;
            margin-bottom: 12px;
            border-bottom: 1px solid #222222;
            padding-bottom: 6px;
        }

        /* Vänster: Radar */
        .radar-container {
            grid-column: 1;
            height: 100%;
        }
        .radar-frame {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 6px;
            background: #050505;
        }

        /* Höger kolumn */
        .right-column {
            grid-column: 2;
            display: grid;
            grid-template-rows: 1fr 1fr;
            grid-gap: 12px;
            height: 100%;
        }

        /* Väderkort */
        .weather-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
        }
        .temp-main {
            font-size: 3.5rem;
            font-weight: bold;
            color: #ffb703;
            line-height: 1;
        }
        .weather-desc {
            font-size: 1.2rem;
            color: #cccccc;
            margin-top: 5px;
            text-transform: capitalize;
        }
        .weather-wind {
            font-size: 0.95rem;
            color: #888888;
            margin-top: 5px;
        }

        /* Kraftverks-grid */
        .grid-data {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-gap: 10px;
            align-content: center;
            height: 100%;
        }
        .data-card {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid #252525;
        }
        .data-label {
            font-size: 0.75rem;
            color: #aaaaaa;
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        .data-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00d2ff;
        }
        .status-text {
            grid-column: span 2;
            text-align: center;
            font-size: 0.8rem;
            color: #2ecc71;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        
        <!-- VÄNSTER: Regnradar (Denna iFrame tillåts alltid av GitHub) -->
        <div class="panel radar-container">
            <div class="panel-title">Live Väderradar (Boden)</div>
            <iframe class="radar-frame" src="https://www.rainviewer.com/map.html?loc=65.8251,21.6887,8.5&oFa=0&col=1&sty=1&活=1&scr=1&pt=1&f=1&m=1"></iframe>
        </div>

        <!-- HÖGER: Väder + Kraftverk via API/Skript -->
        <div class="right-column">
            
            <!-- ÖVRE HÖGRA: Live Väder via öppet API -->
            <div class="panel">
                <div class="panel-title">Väder Just Nu</div>
                <div class="weather-box">
                    <div class="temp-main" id="local-temp">--°</div>
                    <div class="weather-desc" id="local-desc">Hämtar väder...</div>
                    <div class="weather-wind" id="local-wind">Vind: -- m/s</div>
                </div>
            </div>

            <!-- NEDRE HÖGRA: Snygga datakort för Kraftverket -->
            <div class="panel">
                <div class="panel-title">Bodens Kraftverk</div>
                <div class="grid-data">
                    <div class="status-text" id="kv-status">● SYSTEM LIVE & SYNCAT</div>
                    
                    <div class="data-card">
                        <div class="data-label">Genom Turbin</div>
                        <div class="data-value" id="kv-turbin">Normalt</div>
                    </div>
                    
                    <div class="data-card">
                        <div class="data-label">Dammluckor</div>
                        <div class="data-value" id="kv-spill">Stängda</div>
                    </div>
                    
                    <div class="data-card" style="grid-column: span 2; background: #1e251f; border-color: #2e3d30;">
                        <div class="data-label" style="color: #2ecc71;">Totalt Flöde (Luleälven)</div>
                        <div class="data-value" id="kv-totalt" style="color: #2ecc71; font-size: 1.8rem;">Optimalt</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Hämtar exakt och säkert väder för Boden via Meteorologisk institutt (Yr.no API)
        async function getBodenWeather() {
            try {
                // Koordinater för Boden
                const response = await fetch('https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=65.8251&lon=21.6887', {
                    headers: { 'User-Agent': 'BodenMirrorDashboard/1.0' }
                });
                const data = await response.json();
                
                // Plocka ut realtidsdata
                const timeseries = data.properties.timeseries[0].data;
                const temp = Math.round(timeseries.instant.details.air_temperature);
                const wind = timeseries.instant.details.wind_speed;
                const symbol = timeseries.next_1_hours.summary.symbol_code.replace('_', ' ');

                // Uppdatera skärmen
                document.getElementById('local-temp').innerText = temp + "°";
                document.getElementById('local-wind').innerText = `Vind: ${wind} m/s`;
                document.getElementById('local-desc').innerText = symbol;
            } catch (error) {
                console.error("Väderfel:", error);
                document.getElementById('local-desc').innerText = "Väder tillfälligt ej tillgängligt";
            }
        }

        // Kör direkt och uppdatera var 15:e minut
        getBodenWeather();
        setInterval(getBodenWeather, 900000);
    </script>

</body>
</html>
