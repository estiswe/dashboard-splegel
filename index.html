<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boden Tactical Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', -apple-system, Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
            padding: 12px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-gap: 12px;
            height: 100%;
        }

        .panel {
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-title {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888888;
            margin-bottom: 12px;
            border-bottom: 1px solid #222222;
            padding-bottom: 6px;
        }

        /* Vänster: Radar */
        .radar-container {
            grid-column: 1;
            height: 100%;
        }
        .radar-frame {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 6px;
            background: #050505;
        }

        /* Höger kolumn */
        .right-column {
            grid-column: 2;
            display: grid;
            grid-template-rows: 1.2fr 0.8fr;
            grid-gap: 12px;
            height: 100%;
        }

        /* 3-Dagars Väderprognos Layout */
        .forecast-grid {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            height: 100%;
        }
        .forecast-row {
            display: grid;
            grid-template-columns: 80px 50px 1fr 60px;
            align-items: center;
            padding: 10px;
            background: #161616;
            border-radius: 6px;
            border: 1px solid #222222;
        }
        .day-name {
            font-weight: bold;
            font-size: 1rem;
            color: #ffffff;
        }
        .weather-icon {
            width: 35px;
            height: 35px;
        }
        .weather-info {
            font-size: 0.85rem;
            color: #aaaaaa;
            padding-left: 10px;
            text-transform: capitalize;
        }
        .day-temp {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffb703;
            text-align: right;
        }

        /* Kraftverks-grid */
        .grid-data {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-gap: 10px;
            align-content: center;
            height: 100%;
        }
        .data-card {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid #252525;
        }
        .data-label {
            font-size: 0.75rem;
            color: #aaaaaa;
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        .data-value {
            font-size: 1.6rem;
            font-weight: bold;
            color: #00d2ff;
        }
        .status-text {
            grid-column: span 2;
            text-align: center;
            font-size: 0.8rem;
            color: #888888;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        
        <div class="panel radar-container">
            <div class="panel-title">
